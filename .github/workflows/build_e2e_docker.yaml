name: Build E2E Docker Images

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      include_guardrails:
        description: "Build and include guardrails-backend image"
        required: false
        default: false
        type: boolean

jobs:
  build:
    name: Build E2E Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Restore Docker images from cache
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/opik-images.tar.gz
          key: opik-docker-images-${{ github.sha }}${{ inputs.include_guardrails == true && '-guardrails' || '' }}

      - name: Checkout
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v6

      - name: Build E2E Docker images
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          COMPOSE_BAKE: false
        run: |
          SERVICES="backend python-backend"
          if [ "${{ inputs.include_guardrails }}" = "true" ]; then
            SERVICES="$SERVICES guardrails-backend"
          fi
          docker compose -f deployment/docker-compose/docker-compose.yaml \
            build $SERVICES

      - name: Save E2E Docker images
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          IMAGES="ghcr.io/comet-ml/opik/opik-backend:latest ghcr.io/comet-ml/opik/opik-python-backend:latest"
          if [ "${{ inputs.include_guardrails }}" = "true" ]; then
            IMAGES="$IMAGES ghcr.io/comet-ml/opik/opik-guardrails-backend:latest"
          fi
          docker save $IMAGES | pigz > /tmp/opik-images.tar.gz

      - name: Save Docker images to cache
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: /tmp/opik-images.tar.gz
          key: opik-docker-images-${{ github.sha }}${{ inputs.include_guardrails == true && '-guardrails' || '' }}

      - name: Upload E2E Docker images
        uses: actions/upload-artifact@v7
        with:
          name: opik-docker-images
          path: /tmp/opik-images.tar.gz
          retention-days: 1
