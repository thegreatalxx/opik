name: "Guardrails Backend Unit Tests"
run-name: "Guardrails Backend Unit Tests on ${{ github.ref_name }} by @${{ github.actor }}"
permissions:
  contents: read
  checks: write
  pull-requests: write

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/opik-guardrails-backend/**'
      - '.github/workflows/guardrails_unit_tests.yml'
  push:
    branches:
      - 'main'
    paths:
      - 'apps/opik-guardrails-backend/**'
      - '.github/workflows/guardrails_unit_tests.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  unit-tests:
    name: Guardrails Backend Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/opik-guardrails-backend/
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r tests/test_requirements.txt

      - name: Run unit tests
        run: |
          cd tests && pytest unit -v --junitxml=../test-results.xml

      - name: Publish Test Report
        uses: EnricoMi/publish-unit-test-result-action/linux@v2
        if: always()
        with:
          action_fail: true
          comment_mode: failures
          check_name: Guardrails Backend Unit Tests Results
          files: apps/opik-guardrails-backend/test-results.xml

  notify-slack:
    name: "📢 Slack Notification"
    runs-on: ubuntu-latest
    needs: unit-tests
    if: always() && needs.unit-tests.result == 'failure'
    steps:
      - name: "🔍 Check Slack configuration"
        id: check-slack
        run: |
          if [ -z "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "::notice::SLACK_WEBHOOK_URL not configured - Slack notification will be skipped"
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - name: "📢 Send Slack notification"
        if: steps.check-slack.outputs.configured == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          BRANCH="${{ github.ref_name }}"
          COMMIT_SHA="${{ github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          WORKFLOW_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TRIGGER="${{ github.event_name }}"
          AUTHOR="${{ github.actor }}"

          cat << EOF > payload.json
          {
            "attachments": [
              {
                "color": "danger",
                "blocks": [
                  {
                    "type": "header",
                    "text": {
                      "type": "plain_text",
                      "text": "❌ Guardrails Backend Unit Tests Failed",
                      "emoji": true
                    }
                  },
                  {
                    "type": "section",
                    "fields": [
                      {"type": "mrkdwn", "text": "*Branch:*\n\`$BRANCH\`"},
                      {"type": "mrkdwn", "text": "*Trigger:*\n\`$TRIGGER\`"},
                      {"type": "mrkdwn", "text": "*Author:*\n$AUTHOR"},
                      {"type": "mrkdwn", "text": "*Commit:*\n<https://github.com/${{ github.repository }}/commit/$COMMIT_SHA|\`$SHORT_SHA\`>"}
                    ]
                  },
                  {
                    "type": "actions",
                    "elements": [
                      {
                        "type": "button",
                        "text": {"type": "plain_text", "text": "🔍 View Workflow", "emoji": true},
                        "url": "$WORKFLOW_URL",
                        "style": "primary"
                      }
                    ]
                  }
                ]
              }
            ]
          }
          EOF

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST -H 'Content-type: application/json' \
            --data @payload.json "$SLACK_WEBHOOK_URL")

          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ Slack notification sent"
          else
            echo "⚠️ Slack notification failed with HTTP code: $HTTP_CODE"
          fi
